name: "Maintenance - Security"

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  security:
    runs-on: ubuntu-latest
    outputs:
      findings: ${{ steps.audit.outputs.findings }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install pip-audit

      - name: Run security audit (advisory)
        id: audit
        run: |
          set +e
          pip-audit -f json -o pip-audit.json
          RC=$?
          if [ "$RC" -ne 0 ]; then
            echo "findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "findings=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Open issue on security findings
        if: steps.audit.outputs.findings == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const title = "[Maintenance] Security findings detected";
            const body = [
              "Automated security maintenance found dependency vulnerabilities.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "This workflow is configured as advisory."
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["maintenance", "automated"]
            });
