name: "Maintenance - Docs Compliance"

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  docs:
    runs-on: ubuntu-latest
    outputs:
      docs_ok: ${{ steps.check.outputs.docs_ok }}
    steps:
      - uses: actions/checkout@v6

      - name: Check documentation baseline
        id: check
        run: |
          set +e
          FAIL=0

          test -f README.md || FAIL=1
          test -f CONTRIBUTING.md || FAIL=1
          test -f docs/CLI.md || FAIL=1
          test -f docs/DEVELOPMENT.md || FAIL=1

          if [ "$FAIL" -eq 0 ]; then
            echo "docs_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_ok=false" >> "$GITHUB_OUTPUT"
          fi

          exit 0

      - name: Open issue on docs compliance drift
        if: steps.check.outputs.docs_ok == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "[Maintenance] Documentation compliance drift detected";
            const body = [
              "Automated docs compliance checks found missing baseline documentation files.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["maintenance", "automated"]
            });
