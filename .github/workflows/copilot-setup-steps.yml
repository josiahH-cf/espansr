# Copilot Coding Agent — Setup Steps
# Runs before every Copilot agent session to install dependencies and configure environment.
name: "Copilot Setup Steps"
on: workflow_dispatch

concurrency:
  group: copilot-setup
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      INSTALL_CMD: python -m pip install -e ".[dev]"
      BUILD_CMD: python -m pip install build && python -m build
      LINT_CMD: ruff check .
      TEST_CMD: pytest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify setup
        run: echo "Environment ready for Copilot Coding Agent"

      - name: Install dependencies
        run: |
          set -euo pipefail
          eval "$INSTALL_CMD"

      - name: Build project
        run: |
          set -euo pipefail
          eval "$BUILD_CMD"

      - name: Lint project
        run: |
          set -euo pipefail
          eval "$LINT_CMD"

      - name: Run tests
        run: |
          set -euo pipefail
          eval "$TEST_CMD"
