name: "Maintenance - Lint"

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lint:
    runs-on: ubuntu-latest
    outputs:
      has_failures: ${{ steps.run_lint.outputs.has_failures }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run lint checks (advisory)
        id: run_lint
        run: |
          set +e
          ruff check .
          RUFF_RC=$?
          black --check .
          BLACK_RC=$?
          scripts/workflow-lint.sh
          WF_RC=$?

          HAS_FAILS=false
          if [ "$RUFF_RC" -ne 0 ] || [ "$BLACK_RC" -ne 0 ] || [ "$WF_RC" -ne 0 ]; then
            HAS_FAILS=true
          fi

          echo "has_failures=$HAS_FAILS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Open issue on maintenance lint findings
        if: steps.run_lint.outputs.has_failures == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "[Maintenance] Lint findings detected";
            const body = [
              "Automated lint maintenance found issues.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "This workflow is configured as advisory."
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["maintenance", "automated"]
            });
