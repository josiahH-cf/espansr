name: "Claude Review — Mention Triggered"
on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR against the project's acceptance criteria or routine maintenance request.
            Read AGENTS.md for project conventions.
            Read workflow/BOUNDARIES.md for behavioral rules.
            For feature work, verify each acceptance criterion has meaningful tests and matches the spec.
            For routine maintenance, verify the diff matches the request scope and includes relevant check evidence.
            Output a PASS/FAIL verdict with blockers first.
          claude_args: "--max-turns 5"
